<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0d14"/>
      <stop offset="50%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>

    <!-- Accent Gradients -->
    <linearGradient id="cyanPurple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>

    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.0"/>
    </linearGradient>

    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02"/>
    </linearGradient>

    <!-- Drop Shadows & Filters -->
    <filter id="blurGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="30" result="blur"/>
    </filter>

    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Base Background -->
  <rect width="1200" height="420" fill="url(#bgGrad)" rx="16"/>

  <!-- Ambient Glow Circles -->
  <circle cx="150" cy="100" r="220" fill="#38bdf8" opacity="0.12" filter="url(#blurGlow)"/>
  <circle cx="1050" cy="300" r="250" fill="#a855f7" opacity="0.15" filter="url(#blurGlow)"/>
  <circle cx="600" cy="200" r="180" fill="#6366f1" opacity="0.10" filter="url(#blurGlow)"/>

  <!-- Subtle Grid Lines -->
  <g opacity="0.05" stroke="#ffffff" stroke-width="1">
    <path d="M0 60 H1200 M0 120 H1200 M0 180 H1200 M0 240 H1200 M0 300 H1200 M0 360 H1200"/>
    <path d="M150 0 V420 M300 0 V420 M450 0 V420 M600 0 V420 M750 0 V420 M900 0 V420 M1050 0 V420"/>
  </g>

  <!-- Header Category Badge -->
  <g transform="translate(60, 50)">
    <rect width="240" height="32" rx="16" fill="url(#cardGrad)" stroke="#38bdf8" stroke-opacity="0.4" stroke-width="1.5"/>
    <circle cx="18" cy="16" r="5" fill="#38bdf8">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="32" y="21" font-family="'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="700" fill="#38bdf8" letter-spacing="1.5">INDUSTRIAL AI &amp; PHM ENGINE</text>
  </g>

  <!-- Main Title -->
  <text x="60" y="130" font-family="'Segoe UI', Roboto, sans-serif" font-size="44" font-weight="800" fill="#ffffff" letter-spacing="-0.5">
    Predictive Maintenance System
  </text>
  <text x="60" y="170" font-family="'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="600" fill="url(#cyanPurple)">
    Turbofan Engine Remaining Useful Life (RUL) &amp; Risk Analytics
  </text>

  <!-- Subtitle Description -->
  <text x="60" y="205" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#94a3b8" max-width="600">
    End-to-End Deep Prognostics Framework on NASA C-MAPSS Sensor Telemetry. Multi-Model Architecture
  </text>
  <text x="60" y="225" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" fill="#94a3b8">
    combining RUL Regression, 30-Cycle Failure Classification, and MLP Neural Risk Segmentation.
  </text>

  <!-- Stat Cards Grid -->
  <g transform="translate(60, 265)">
    <!-- Stat Card 1 -->
    <g transform="translate(0, 0)" filter="url(#shadow)">
      <rect width="240" height="100" rx="12" fill="url(#cardGrad)" stroke="#334155" stroke-width="1.5"/>
      <text x="24" y="42" font-family="'Segoe UI', Roboto, sans-serif" font-size="28" font-weight="800" fill="#38bdf8">98.45%</text>
      <text x="24" y="68" font-family="'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="600" fill="#f8fafc">AUC-ROC SCORE</text>
      <text x="24" y="84" font-family="'Segoe UI', Roboto, sans-serif" font-size="11" fill="#64748b">Binary Failure Window</text>
    </g>

    <!-- Stat Card 2 -->
    <g transform="translate(260, 0)" filter="url(#shadow)">
      <rect width="240" height="100" rx="12" fill="url(#cardGrad)" stroke="#334155" stroke-width="1.5"/>
      <text x="24" y="42" font-family="'Segoe UI', Roboto, sans-serif" font-size="28" font-weight="800" fill="#c084fc">21 Sensors</text>
      <text x="24" y="68" font-family="'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="600" fill="#f8fafc">IOT TELEMETRY STREAM</text>
      <text x="24" y="84" font-family="'Segoe UI', Roboto, sans-serif" font-size="11" fill="#64748b">Rolling Mean &amp; Std Extracted</text>
    </g>

    <!-- Stat Card 3 -->
    <g transform="translate(520, 0)" filter="url(#shadow)">
      <rect width="240" height="100" rx="12" fill="url(#cardGrad)" stroke="#334155" stroke-width="1.5"/>
      <text x="24" y="42" font-family="'Segoe UI', Roboto, sans-serif" font-size="28" font-weight="800" fill="#34d399">3 Models</text>
      <text x="24" y="68" font-family="'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="600" fill="#f8fafc">ML PARADIGMS</text>
      <text x="24" y="84" font-family="'Segoe UI', Roboto, sans-serif" font-size="11" fill="#64748b">Regression, Binary, Neural MLP</text>
    </g>

    <!-- Stat Card 4 -->
    <g transform="translate(780, 0)" filter="url(#shadow)">
      <rect width="240" height="100" rx="12" fill="url(#cardGrad)" stroke="#334155" stroke-width="1.5"/>
      <text x="24" y="42" font-family="'Segoe UI', Roboto, sans-serif" font-size="28" font-weight="800" fill="#fbbf24">100 Fleet</text>
      <text x="24" y="68" font-family="'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="600" fill="#f8fafc">TURBOFAN ENGINES</text>
      <text x="24" y="84" font-family="'Segoe UI', Roboto, sans-serif" font-size="11" fill="#64748b">Run-to-Failure Datasets</text>
    </g>
  </g>

  <!-- Decorative Right Side Jet Turbine Graphic -->
  <g transform="translate(1020, 140)" opacity="0.85">
    <circle cx="0" cy="0" r="85" fill="none" stroke="url(#cyanPurple)" stroke-width="2.5" stroke-dasharray="8 4"/>
    <circle cx="0" cy="0" r="60" fill="none" stroke="#6366f1" stroke-width="2"/>
    <circle cx="0" cy="0" r="35" fill="none" stroke="#38bdf8" stroke-width="3"/>
    <circle cx="0" cy="0" r="12" fill="#38bdf8"/>
    
    <!-- Turbine Blades -->
    <path d="M0 -35 L5 -12 L-5 -12 Z" fill="#c084fc"/>
    <path d="M35 0 L12 5 L12 -5 Z" fill="#c084fc"/>
    <path d="M0 35 L-5 12 L5 12 Z" fill="#c084fc"/>
    <path d="-35 0 L-12 -5 L-12 5 Z" fill="#c084fc"/>

    <path d="M25 -25 L8 -8 L2 -14 Z" fill="#38bdf8"/>
    <path d="M25 25 L8 8 L14 2 Z" fill="#38bdf8"/>
    <path d="-25 25 L-8 8 L-2 14 Z" fill="#38bdf8"/>
    <path d="-25 -25 L-8 -8 L-14 -2 Z" fill="#38bdf8"/>
  </g>
</svg>
